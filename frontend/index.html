<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScamCheck — Kiểm tra tin nhắn lừa đảo</title>
  <style>
    :root { --font-base: 19px; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; font-size: var(--font-base); line-height: 1.6; color: #172033; background: #f6f7f9; display: flex; flex-direction: column; min-height: 100vh; }
    header, main, footer { width: 100%; max-width: 760px; margin: 0 auto; padding: 0 16px; }
    header { padding-top: 20px; }
    h1 { font-size: 1.7rem; margin: 0 0 4px; }
    h2 { font-size: 1.1rem; margin: 20px 0 8px; }
    .subtitle, .status, #usage { color: #4b5563; }
    .subtitle { margin: 0 0 20px; }
    textarea { width: 100%; min-height: 160px; font: inherit; padding: 14px; border: 2px solid #9aa8ba; border-radius: 12px; resize: vertical; }
    textarea:focus { outline: 3px solid #bfdbfe; border-color: #174ea6; }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; margin: 16px 0 8px; }
    button { min-height: 48px; font: inherit; padding: 10px 22px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; }
    #checkBtn { background: #174ea6; color: #fff; }
    #checkBtn:disabled { background: #93a3b8; cursor: not-allowed; }
    #clearBtn { background: #e2e8f0; color: #172033; }
    .status { padding: 12px 0 0; min-height: 1.6em; }
    #usage { min-height: 1.6em; font-size: .9rem; }
    .status.loading::after { content: ""; display: inline-block; width: 14px; height: 14px; margin-left: 8px; border: 3px solid #cbd5e1; border-top-color: #174ea6; border-radius: 50%; animation: spin .8s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #result, #error { border-radius: 12px; padding: 18px; margin: 16px 0; }
    #result { background: #fff; border: 1px solid #cbd5e1; }
    #result[data-risk="an_toan"] { border-left: 7px solid #15803d; }
    #result[data-risk="nghi_ngo"] { border-left: 7px solid #a16207; }
    #result[data-risk="nguy_hiem"] { border-left: 7px solid #b91c1c; }
    #result[data-risk="khong_lien_quan"] { border-left: 7px solid #475569; }
    .risk-label { margin: 0; font-weight: 800; }
    .reason { margin: 8px 0 0; }
    .signal-list, .action-list { margin: 0; padding-left: 1.35em; }
    li + li { margin-top: 8px; }
    blockquote { margin: 6px 0 0; padding: 6px 10px; background: #fff8cf; border-left: 4px solid #d6a700; }
    #error { background: #fef2f2; border: 1px solid #dc2626; color: #8b1111; }
    main { flex: 1; padding-bottom: 24px; }
    footer { background: #172033; color: #e2e8f0; font-size: .9rem; padding: 18px 16px; max-width: none; }
    footer .inner { max-width: 760px; margin: 0 auto; }
    footer strong { color: #fff; }
  </style>
</head>
<body>
  <header>
    <h1>ScamCheck</h1>
    <p class="subtitle">Dán tin nhắn nghi ngờ lừa đảo vào ô dưới và bấm <strong>Kiểm tra</strong>.</p>
  </header>
  <main>
    <label for="textInput">Nội dung tin nhắn</label>
    <textarea id="textInput" placeholder="Dán tin nhắn SMS, Zalo, Messenger hoặc email nghi ngờ vào đây..."></textarea>
    <div class="actions">
      <button id="checkBtn" type="button">Kiểm tra</button>
      <button id="clearBtn" type="button">Xoá</button>
    </div>
    <div id="status" class="status" role="status" aria-live="polite"></div>
    <p id="usage" aria-live="polite"></p>
    <div id="error" role="alert" hidden></div>
    <section id="result" aria-live="polite" hidden></section>
  </main>
  <footer><div class="inner"><strong>Lưu ý pháp lý:</strong> ScamCheck là công cụ giáo dục do nhóm học viên phát triển và <strong>không thay thế cảnh báo chính thức</strong> từ ngân hàng hoặc cơ quan chức năng. Khi nghi ngờ, hãy gọi <strong>tổng đài chính thức</strong> in trên thẻ ngân hàng.</div></footer>
  <script type="module" src="/assets/js/app.js"></script>
</body>
</html>
