<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScamCheck — Kiểm tra tin nhắn lừa đảo</title>
  <!-- Cấp 1: HTML thô, chưa đẹp. Foundation tokens + anti-ai-design ở Stage 2. -->
  <style>
    /* CSS tối giản, đọc được trên iPhone của người 45+. Font >= 18px. */
    :root { --font-base: 19px; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: var(--font-base); line-height: 1.6; color: #1a1a1a; background: #f6f7f9;
      display: flex; flex-direction: column; min-height: 100vh;
    }
    header, main, footer { width: 100%; max-width: 760px; margin: 0 auto; padding: 0 16px; }
    header { padding-top: 20px; }
    h1 { font-size: 1.6rem; margin: 0 0 4px; }
    .subtitle { color: #555; margin: 0 0 20px; }
    textarea {
      width: 100%; min-height: 160px; font-size: var(--font-base); padding: 14px;
      border: 2px solid #cbd5e1; border-radius: 12px; resize: vertical;
      font-family: inherit;
    }
    textarea:focus { outline: none; border-color: #2563eb; }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; margin: 16px 0; }
    button {
      font-size: var(--font-base); padding: 14px 24px; border: none; border-radius: 12px;
      cursor: pointer; font-weight: 600;
    }
    #checkBtn { background: #2563eb; color: #fff; }
    #checkBtn:disabled { background: #93a3b8; cursor: not-allowed; }
    #clearBtn { background: #e2e8f0; color: #1a1a1a; }
    .status { padding: 12px 0; color: #555; min-height: 1.6em; }
    .status.loading::after {
      content: ""; display: inline-block; width: 14px; height: 14px; margin-left: 8px;
      border: 3px solid #cbd5e1; border-top-color: #2563eb; border-radius: 50%;
      animation: spin 0.8s linear infinite; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #result {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 18px;
      white-space: pre-wrap; margin: 16px 0; display: none;
    }
    #error {
      background: #fef2f2; border: 1px solid #fecaca; color: #991b1b;
      border-radius: 12px; padding: 14px; margin: 16px 0; display: none;
    }
    main { flex: 1; padding-bottom: 24px; }
    /* Footer pháp lý — LUÔN hiển thị, mọi màn hình (L1-04). */
    footer {
      background: #1e293b; color: #e2e8f0; font-size: 0.9rem; padding: 18px 16px;
      max-width: none;
    }
    footer .inner { max-width: 760px; margin: 0 auto; }
    footer strong { color: #fff; }
  </style>
</head>
<body>
  <header>
    <h1>🔍 ScamCheck</h1>
    <p class="subtitle">Dán tin nhắn nghi ngờ lừa đảo vào ô dưới và bấm <strong>Kiểm tra</strong>.</p>
  </header>

  <main>
    <textarea id="textInput" placeholder="Dán tin nhắn SMS, Zalo, Messenger hoặc email nghi ngờ vào đây..."></textarea>
    <div class="actions">
      <button id="checkBtn" type="button">Kiểm tra</button>
      <button id="clearBtn" type="button">Xoá</button>
    </div>
    <div id="status" class="status" role="status" aria-live="polite"></div>
    <div id="error" role="alert"></div>
    <div id="result" aria-live="polite"></div>
  </main>

  <footer>
    <div class="inner">
      <strong>Lưu ý pháp lý:</strong> ScamCheck là công cụ giáo dục do nhóm học viên phát triển và
      <strong>không thay thế cảnh báo chính thức</strong> từ ngân hàng hoặc cơ quan chức năng.
      Khi nghi ngờ, hãy gọi <strong>tổng đài chính thức</strong> in trên thẻ ngân hàng.
    </div>
  </footer>

  <script type="module" src="/assets/js/app.js"></script>
</body>
</html>
