# Nginx config mẫu cho ScamCheck (VM target team6-scamcheck.exe.xyz).
#
# Nhiệm vụ:
#   1. Phục vụ frontend/ (static HTML/CSS/JS) tại /
#   2. Reverse-proxy /api/* -> Flask (gunicorn) ở 127.0.0.1:5000
# Trình duyệt chỉ thấy 1 origin -> không lo CORS.
#
# Cài: copy vào /etc/nginx/sites-available/scamcheck và symlink vào sites-enabled,
# hoặc paste vào server block sẵn có. root trỏ tới thư mục frontend của repo.

server {
    listen 8000;
    listen 8001;  # exe.dev Login proxy cho universal AI history/admin export
    server_name team6-scamcheck.exe.xyz;

    # Web root = thư mục frontend trong repo.
    root /opt/scamcheck/frontend;
    index index.html;

    # Giữ upload nhỏ, chặn body quá lớn.
    client_max_body_size 64k;

    # Reverse-proxy API tới backend Flask.
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        # Giữ :8001 để backend chỉ tin identity header trên admin origin.
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 45s;  # Gemini có thể chậm, cho dư thời gian.
    }

    # Asset dùng chung giữa các trang: lưu browser cache lâu dài. Mỗi lần đổi
    # CSS/JS phải bump query version trong HTML; font/icon có tên file ổn định.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_vary on;
    gzip_types text/css application/javascript application/json image/svg+xml font/woff2;

    # HTML luôn được revalidate; chỉ asset fingerprinted mới immutable.
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA-friendly fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
